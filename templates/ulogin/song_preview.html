{% extends 'ulayout.html' %}

{% block content %}
  <div class="song-preview">
    <h2>{{ song.title }}</h2>
    <p>By: {{ song.artist }}</p>
    <img src="{{ song.album_art }}" alt="{{ song.title }} Album Art" />
    <!-- Add song player or other relevant elements here -->
    <audio controls>
        <source src="{{ url_for('static', filename='audio/your_song.mp3') }}" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
  </div>
{% endblock %}
